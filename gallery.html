<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔐 Gallery's Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            padding: 20px;
        }

        /* পাসওয়ার্ড স্ক্রিন */
        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .password-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .password-box h2 {
            margin-bottom: 20px;
            color: #2a5298;
        }

        .password-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .password-box button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        .hint {
            margin-top: 15px;
            font-size: 12px;
            color: #ff9800;
            background: #f0f0f0;
            padding: 8px;
            border-radius: 8px;
        }

        /* মেইন গ্যালারি UI */
        .gallery-container {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
        }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .cat-btn {
            background: #f0f0f0;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .cat-btn.active {
            background: #ff9800;
            color: white;
            transform: scale(1.05);
        }

        .add-photo-area {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .add-photo-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        .add-photo-area button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .photo-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .photo-card:hover {
            transform: scale(1.02);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .photo-info {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        /* মডাল ভিউ - এইচডি কোয়ালিটি ও জুম */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal img {
            max-width: 90%;
            max-height: 75%;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .zoom-controls {
            margin-top: 25px;
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.7);
            padding: 12px 25px;
            border-radius: 50px;
        }

        .zoom-controls button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .empty-msg {
            text-align: center;
            padding: 50px;
            background: #f9f9f9;
            border-radius: 15px;
            color: #666;
            font-size: 18px;
        }

        @media (max-width: 600px) {
            .cat-btn { padding: 8px 16px; font-size: 14px; }
            .add-photo-area button { padding: 8px 16px; }
        }
    </style>
</head>
<body>
<a href="index.html" style="
    display:inline-block;
    margin-bottom:15px;
    text-decoration:none;
    background:#ff9800;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
">
⬅ Back to Home
</a>
<!-- পাসওয়ার্ড স্ক্রিন -->
<div id="passwordScreen" class="password-screen">
    <div class="password-box">
        <h2>🔒 Locked the gallery</h2>
        <input type="password" id="passwordInput" placeholder="Enter your password" autocomplete="off">
        <button onclick="checkPassword()">🔓 Open </button>
        <div class="hint">💡 Hint:Anukul@213</div>
    </div>
</div>

<!-- মেইন গ্যালারি -->
<div id="galleryContainer" class="gallery-container">
    <div class="category-buttons" id="categoryButtons">
        <button class="cat-btn" data-cat="bengali">📖 Bengali</button>
        <button class="cat-btn" data-cat="english">🇬🇧 English</button>
        <button class="cat-btn" data-cat="biology">🧬 Biology</button>
        <button class="cat-btn" data-cat="chemistry">⚗️ Chemintry</button>
        <button class="cat-btn" data-cat="physics">⚛️ Physics</button>
    </div>

    <div class="add-photo-area">
        <input type="file" id="photoInput" accept="image/jpeg,image/png,image/jpg,image/webp">
        <button onclick="addPhoto()"> Upload Image</button>
    </div>

    <div id="photoGrid" class="photo-grid">
        <!-- The pictures will be shown here -->
    </div>
</div>

<!-- এইচডি জুম ভিউয়ের জন্য মডাল -->
<div id="imageModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <img id="modalImage" src="" alt="HD Quality View">
    <div class="zoom-controls">
        <button onclick="zoomIn()">🔍 Zoom in (+)</button>
        <button onclick="zoomOut()">🔍 Zoom out (-)</button>
        <button onclick="resetZoom()">⟳ Reset</button>
    </div>
</div>


<script>
    // ---------- ভেরিয়েবল ----------
    let currentCategory = "bengali";
    let galleryData = {};
    let currentZoom = 1;
    let modalImgElement = null;

    // ---------- Check Password ----------
    function checkPassword() {
        const password = document.getElementById("passwordInput").value;
        const correctPassword = "7@6Anukul@15";
        if (password === correctPassword) {
            document.getElementById("passwordScreen").style.display = "none";
            document.getElementById("galleryContainer").style.display = "block";
            loadDataFromLocalStorage();
            renderCurrentCategory();
            attachCategoryEvents();
        } else {
            alert("❌ Worng Password! Hint: Anukul123");
            document.getElementById("passwordInput").value = "";
        }
    }

    // ---------- লোকাল স্টোরেজ থেকে ডাটা লোড ও সেভ ----------
    function loadDataFromLocalStorage() {
        const saved = localStorage.getItem("subjectGalleryData");
        if (saved) {
            galleryData = JSON.parse(saved);
        } else {
            galleryData = {
                bengali: [],
                english: [],
                biology: [],
                chemistry: [],
                physics: []
            };
        }
    }

    function saveDataToLocalStorage() {
        localStorage.setItem("subjectGalleryData", JSON.stringify(galleryData));
    }

    // ---------- Adding images ----------
    function addPhoto() {
        const fileInput = document.getElementById("photoInput");
        if (!fileInput.files || fileInput.files.length === 0) {
            alert("Please select an image!");
            return;
        }
        const file = fileInput.files[0];
        if (!file.type.startsWith("image/")) {
            alert("Only image files are allowed!");
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Image = e.target.result;
            galleryData[currentCategory].push(base64Image);
            saveDataToLocalStorage();
            renderCurrentCategory();
            fileInput.value = "";
            alert("✅ Image added successfully");
        };
        reader.readAsDataURL(file);
    }

    // ---------- Delete Inage ----------
    function deletePhoto(index) {
        if (confirm("I want to delete this photo?")) {
            galleryData[currentCategory].splice(index, 1);
            saveDataToLocalStorage();
            renderCurrentCategory();
            alert("🗑️The image has been deleted!");
        }
    }

    // ---------- HD view & Zoom ----------
    function openModal(imageSrc) {
        const modal = document.getElementById("imageModal");
        modalImgElement = document.getElementById("modalImage");
        currentZoom = 1;
        modalImgElement.style.transform = `scale(${currentZoom})`;
        modalImgElement.src = imageSrc;
        modal.style.display = "flex";
    }

    function closeModal() {
        document.getElementById("imageModal").style.display = "none";
    }

    function zoomIn() {
        if (!modalImgElement) return;
        currentZoom += 0.2;
        if (currentZoom > 3) currentZoom = 3;
        modalImgElement.style.transform = `scale(${currentZoom})`;
    }

    function zoomOut() {
        if (!modalImgElement) return;
        currentZoom -= 0.2;
        if (currentZoom < 0.5) currentZoom = 0.5;
        modalImgElement.style.transform = `scale(${currentZoom})`;
    }

    function resetZoom() {
        currentZoom = 1;
        if (modalImgElement) modalImgElement.style.transform = `scale(1)`;
    }

    // ---------- ছবি গুলো দেখানো ----------
    function renderCurrentCategory() {
        const grid = document.getElementById("photoGrid");
        const photos = galleryData[currentCategory] || [];
        
        if (photos.length === 0) {
            grid.innerHTML = `<div class="empty-msg">📂 "${getCategoryName(currentCategory)}" There are no images ।<br>"Add images"Click on the bottom।</div>`;
            return;
        }
        
        let html = "";
        photos.forEach((imgBase64, idx) => {
            html += `
                <div class="photo-card">
                    <img src="${imgBase64}" alt="Gallery image" onclick="openModal('${imgBase64}')">
                    <div class="photo-info">
                        <span>📷 ছবি ${idx+1}</span>
                        <button class="delete-btn" onclick="deletePhoto(${idx})">🗑 Delete</button>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
    }

    function getCategoryName(cat) {
        const names = {
            bengali: "Bengali",
            english: "English",
            biology: "Biology",
            chemistry: "Chemistry",
            physics: "Physics"
        };
        return names[cat] || cat;
    }

    // ---------- ক্যাটাগরি সুইচ করা ----------
    function attachCategoryEvents() {
        const btns = document.querySelectorAll(".cat-btn");
        btns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                btns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCategory = btn.getAttribute("data-cat");
                renderCurrentCategory();
            });
        });
        document.querySelector(".cat-btn[data-cat='bengali']").classList.add("active");
    }

    // মডালের বাইরে ক্লিক করলে বন্ধ হবে
    window.onclick = function(event) {
        const modal = document.getElementById("imageModal");
        if (event.target === modal) {
            closeModal();
        }
    }
</script>
</body>
</html>
